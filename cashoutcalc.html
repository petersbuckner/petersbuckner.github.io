<!DOCTYPE html>
<html>
<head>
    <title>Cashout Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;   /* Light background */
            color: #222;
            text-align: center;
            padding: 40px;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 15px;
            font-size: 18px;
        }
        th {
            background: #e6e6e6;
            color: #000;
        }
        input {
            padding: 8px;
            font-size: 16px;
            width: 120px;
        }
    </style>
</head>
<body>

<h2>Cashout Calculator</h2>

<table>
    <tr>
        <th>$ Sent To Us</th>
        <th>Deposited On Game</th>
        <th>Minimum</th>
        <th>Maximum</th>
    </tr>
    <tr>
        <td><input type="number" id="sent" oninput="calculate()"></td>
        <td><input type="number" id="deposited" oninput="calculate()"></td>
        <td id="minimum">$0.00</td>
        <td id="maximum">$0.00</td>
    </tr>
</table>

<script>
function calculate() {
    let sent = parseFloat(document.getElementById("sent").value) || 0;
    let deposited = parseFloat(document.getElementById("deposited").value) || 0;

    // Minimum Calculation
    let minValue = deposited * 3;
    if (minValue < 70) {
        minValue = 70;
    }

    // Maximum Calculation
    let maxValue = 0;
    if (sent >= 0 && sent <= 49.99) {
        maxValue = sent * 10;
    } else if (sent >= 50 && sent <= 99.99) {
        maxValue = sent * 15;
    } else if (sent >= 100) {
        maxValue = 4000;
    }

    document.getElementById("minimum").innerText = "$" + minValue.toFixed(2);
    document.getElementById("maximum").innerText = "$" + maxValue.toFixed(2);
}
</script>

</body>
</html>
